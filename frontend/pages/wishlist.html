<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wishlist — NIT KKR Marketplace</title>
    <meta name="description" content="Your saved items on NIT KKR Marketplace." />
    <link rel="stylesheet" href="../css/base/fonts.css" />
    <!-- Base -->
    <link rel="stylesheet" href="../css/base/variables.css" />
    <link rel="stylesheet" href="../css/base/reset.css" />
    <!-- Components -->
    <link rel="stylesheet" href="../css/components/buttons.css" />
    <link rel="stylesheet" href="../css/components/navbar.css" />
    <link rel="stylesheet" href="../css/components/sidebar.css" />
    <link rel="stylesheet" href="../css/components/footer.css" />
    <link rel="stylesheet" href="../css/components/product-card.css" />
    <link rel="stylesheet" href="../css/components/page-header.css" />
    <!-- Page -->
    <link rel="stylesheet" href="../css/pages/wishlist.css" />
</head>

<body>

    <header>
        <div id="navbar-root"></div>
        <div id="page-header-root"></div>
    </header>

    <aside>
        <div id="sidebar-root"></div>
    </aside>

    <main class="layout">
        <div class="toolbar">
            <div class="count-label"><strong id="wCount">0</strong> saved items</div>
            <button class="clear-btn" onclick="clearWishlist()">🗑️ Clear All</button>
        </div>
        <div class="wgrid" id="wgrid">
            <!-- filled by wishlist.js -->
        </div>
    </main>

    <footer>
        <div id="footer-root"></div>
    </footer>

    <script type="module" src="../js/pages/wishlist.js"></script>
</body>

</html>
