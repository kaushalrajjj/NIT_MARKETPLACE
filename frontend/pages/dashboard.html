<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Dashboard — NIT KKR Marketplace</title>
    <meta name="description" content="Manage your listings and saved items on NIT KKR Marketplace." />
    <link rel="stylesheet" href="../css/base/fonts.css" />
    <!-- Base -->
    <link rel="stylesheet" href="../css/base/variables.css" />
    <link rel="stylesheet" href="../css/base/reset.css" />
    <!-- Components -->
    <link rel="stylesheet" href="../css/components/buttons.css" />
    <link rel="stylesheet" href="../css/components/navbar.css" />
    <link rel="stylesheet" href="../css/components/sidebar.css" />
    <link rel="stylesheet" href="../css/components/footer.css" />
    <link rel="stylesheet" href="../css/components/product-card.css" />
    <link rel="stylesheet" href="../css/components/modal.css" />
    <link rel="stylesheet" href="../css/components/page-header.css" />
    <!-- Page -->
    <link rel="stylesheet" href="../css/pages/dashboard.css" />
</head>

<body>

    <header>
        <div id="navbar-root"></div>
        <div id="page-header-root"></div>
    </header>
    <aside>
        <div id="sidebar-root"></div>
    </aside>



    <main class="browse-layout">
        <div class="main-content">

            <!-- TAB BAR -->
            <div class="dash-tabs">
                <button class="dash-tab active" data-tab="listings" onclick="switchTab('listings')">
                    🏪 My Listings
                </button>
                <button class="dash-tab" data-tab="wishlist" onclick="switchTab('wishlist')">
                    ❤️ Saved Items
                    <span class="wish-badge" id="wishBadge"></span>
                </button>
            </div>

            <!-- ── MY LISTINGS SECTION ── -->
            <div id="listingsSection">
                <div class="browse-toolbar">
                    <div class="results-count" id="listingsCount">Your Listings</div>
                    <div class="toolbar-right">
                        <div class="sort-wrap" id="sw">
                            <button class="sort-btn" onclick="toggleSort()">Sort: <span id="sortLbl">Newest First</span>
                                ∨</button>
                            <div class="sort-menu">
                                <div class="sort-opt active" onclick="setSort(this, 'Newest First')">Newest First</div>
                                <div class="sort-opt" onclick="setSort(this, 'Price: Low to High')">Price: Low to High
                                </div>
                                <div class="sort-opt" onclick="setSort(this, 'Price: High to Low')">Price: High to Low
                                </div>
                                <div class="sort-opt" onclick="setSort(this, 'Popularity')">Popularity</div>
                            </div>
                        </div>
                        <div class="vt">
                            <button class="vbtn active" id="gvBtn" onclick="setView('g')">▦</button>
                            <button class="vbtn" id="lvBtn" onclick="setView('l')">≡</button>
                        </div>
                    </div>
                </div>
                <div class="pgrid" id="pgrid">
                    <!-- Products loaded dynamically -->
                </div>
            </div>

            <!-- ── SAVED ITEMS (WISHLIST) SECTION ── -->
            <div id="wishlistSection" style="display:none;">
                <div class="browse-toolbar">
                    <div class="results-count" id="wishlistCount">Saved Items</div>
                    <a href="/wishlist" class="btn btn-outline"
                        style="text-decoration:none; font-size:.82rem; padding:8px 16px;">
                        ↗ View Full Wishlist
                    </a>
                </div>
                <div class="pgrid" id="wgrid">
                    <!-- Wishlist loaded dynamically -->
                </div>
            </div>

        </div>
    </main>

    <footer>
        <div id="footer-root"></div>
    </footer>

    <!-- SCROLL TOP -->
    <button class="stbtn" id="stb" onclick="window.scrollTo({top:0,behavior:'smooth'})">
        ▲
    </button>

    <script type="module" src="../js/pages/dashboard.js"></script>

</body>

</html>
