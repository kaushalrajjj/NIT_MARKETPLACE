<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Browse Items — NIT KKR Marketplace</title>
    <link rel="icon" type="image/png" href="../assets/siteFavicon.png">
    <link rel="stylesheet" href="../css/base/fonts.css" />
    <!-- Base -->
    <link rel="stylesheet" href="../css/base/variables.css" />
    <link rel="stylesheet" href="../css/base/reset.css" />
    <!-- Components -->
    <link rel="stylesheet" href="../css/components/buttons.css" />
    <link rel="stylesheet" href="../css/components/navbar.css" />
    <link rel="stylesheet" href="../css/components/sidebar.css" />
    <link rel="stylesheet" href="../css/components/toast.css" />
    <link rel="stylesheet" href="../css/components/product-card.css" />
    <link rel="stylesheet" href="../css/components/modal.css" />
    <link rel="stylesheet" href="../css/components/sort-dropdown.css" />
    <link rel="stylesheet" href="../css/components/page-header.css" />
    <link rel="stylesheet" href="../css/components/footer.css" />
    <!-- Page -->
    <link rel="stylesheet" href="../css/pages/browse.css" />
</head>

<body>

    <div id="navbar-root"></div>
    <div id="page-header-root"></div>
    <div id="toast-root"></div>
    <aside>
        <div id="sidebar-root"></div>
    </aside>
    <!-- QUICK VIEW MODAL -->
    <div class="modal-overlay" id="qvModal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title" id="qvTitle">Product Details</div>
                <button class="modal-close" onclick="closeModal()"><b>✕</b></button>
            </div>

            <!-- ── Login wall (shown to guests) ─────────────────────── -->
            <div id="qvLoginWall" style="display:none; padding:0">
                <div style="text-align:center; padding: 60px 24px">
                    <div style="font-size:4rem; margin-bottom:20px">🔒</div>
                    <h3 style="font-size:1.35rem; font-weight:800; color:var(--text); margin-bottom:24px">
                        Login to View Details
                    </h3>
                    <div style="max-width:240px; margin:0 auto">
                        <a href="/auth" class="btn btn-blue" style="text-decoration:none; text-align:center; padding:14px; font-weight:700; border-radius:10px; font-size:1rem; display:block">
                            🎓 Login with NIT Email
                        </a>
                    </div>
                </div>
            </div>


            <!-- ── Full content (logged-in users only) ─────────────── -->
            <div id="qvContent" style="display:none">
                <div class="modal-body">
                    <div class="modal-img" id="qvImgWrap">📚</div>
                    <div class="modal-details">
                        <div class="modal-price" id="qvPrice"></div>
                        <div id="qvInfoRows"></div>
                        <div class="modal-desc" id="qvDesc"></div>
                        <div class="modal-actions" id="modalContactActions"></div>
                    </div>
                </div>
            </div>

        </div>
    </div>








    <main class="browse-layout">
        <!-- Categories Sidebar -->
        <aside class="filter-sidebar" id="filterSidebar">
            <div class="filter-header">
                <h3>Categories</h3>
                <button class="filter-reset" onclick="resetFilters()">Reset All</button>
            </div>
            <div class="filter-body">
                <!-- Categories -->
                <div class="filter-section">
                    <div class="filter-section-title" onclick="toggleSection(this)">Category ↓</div>
                    <div class="cat-filter-list" id="sidebarCatList">
                        <label class="cat-filter-item active" onclick="setCat(this, 'all')">
                            <span class="cat-filter-icon">🏠</span>
                            <span class="cat-filter-name">All Categories</span>
                        </label>
                        <label class="cat-filter-item" onclick="setCat(this, 'Books')">
                            <span class="cat-filter-icon">📚</span>
                            <span class="cat-filter-name">Books & Notes</span>
                        </label>
                        <label class="cat-filter-item" onclick="setCat(this, 'Electronics')">
                            <span class="cat-filter-icon">🔌</span>
                            <span class="cat-filter-name">Electronics</span>
                        </label>
                        <label class="cat-filter-item" onclick="setCat(this, 'Cycles')">
                            <span class="cat-filter-icon">🚲</span>
                            <span class="cat-filter-name">Cycles & Gear</span>
                        </label>
                        <label class="cat-filter-item" onclick="setCat(this, 'Hostel')">
                            <span class="cat-filter-icon">📦</span>
                            <span class="cat-filter-name">Hostel Essentials</span>
                        </label>
                        <label class="cat-filter-item" onclick="setCat(this, 'Tools')">
                            <span class="cat-filter-icon">🛠️</span>
                            <span class="cat-filter-name">Lab & Academic</span>
                        </label>
                        <label class="cat-filter-item" onclick="setCat(this, 'Other')">
                            <span class="cat-filter-icon">✨</span>
                            <span class="cat-filter-name">Other</span>
                        </label>
                    </div>
                </div>

                <!-- Removed Price Range, Condition, Location, and Apply Buttons to the top bar -->
            </div>
        </aside>

        <!-- CONTENT -->
        <section class="results-area">
            <!-- Toolbar -->
            <div class="results-toolbar">
                <div class="results-count">Showing <strong id="resultsCount">48</strong> results for "All Items"</div>
                <div class="toolbar-right">
                    
                    <!-- NEW FILTER DROPDOWN -->
                    <div class="filters-dropdown-container" id="filterDropdownContainer">
                        <button class="btn btn-outline filters-btn" onclick="toggleFilterDropdown(event)">
                            <span class="filters-icon">🔍</span> Filters <span class="caret">˅</span>
                        </button>
                        
                        <div class="filters-popover" id="filtersPopover">
                            <div class="fp-header">
                                <h4>Advanced Filters</h4>
                                <span class="fp-close" onclick="toggleFilterDropdown(event)">✕</span>
                            </div>
                            <div class="fp-body">
                                <!-- Price Range -->
                                <div class="filter-section">
                                    <div class="filter-section-title">Price Range</div>
                                    <div class="price-body">
                                        <div class="price-inputs">
                                            <div class="price-input-wrap"><span>₹</span><input type="number" id="priceMin" placeholder="Min" value=""></div>
                                            <div class="price-input-wrap"><span>₹</span><input type="number" id="priceMax" placeholder="Max" value=""></div>
                                        </div>
                                    </div>
                                </div>
                
                                <!-- Condition -->
                                <div class="filter-section">
                                    <div class="filter-section-title">Condition</div>
                                    <div class="check-list">
                                        <label class="check-item"><input type="checkbox" name="condition" value="Brand New"><span class="check-box"></span><span class="lbl">Brand New</span></label>
                                        <label class="check-item"><input type="checkbox" name="condition" value="Like New"><span class="check-box"></span><span class="lbl">Like New</span></label>
                                        <label class="check-item"><input type="checkbox" name="condition" value="Lightly Used"><span class="check-box"></span><span class="lbl">Lightly Used</span></label>
                                        <label class="check-item"><input type="checkbox" name="condition" value="Used"><span class="check-box"></span><span class="lbl">Used</span></label>
                                        <label class="check-item"><input type="checkbox" name="condition" value="Damaged/For Parts"><span class="check-box"></span><span class="lbl">Damaged/For Parts</span></label>
                                    </div>
                                </div>
                
                            </div>
                            <div class="fp-footer">
                                <button class="btn btn-ghost" onclick="resetFilters(); toggleFilterDropdown(event)">Reset</button>
                                <button class="btn btn-primary" onclick="applyFilters('fetch'); toggleFilterDropdown(event)">Apply Filters</button>
                            </div>
                        </div>
                    </div>

                    <div id="sort-root"></div>


                </div>
            </div>

            <!-- Active Filter Chips -->
            <div class="active-filters" id="activeFilters">
                <!-- Filters will be injected here -->
            </div>

            <!-- Grid -->
            <div class="products-grid" id="productsGrid">
                <!-- Products will be loaded dynamically -->
            </div>
        </section>
    </main>



    <!-- FOOTER -->
    <footer>
        <div id="footer-root"></div>
    </footer>

    <script type="module" src="../js/pages/browse.js"></script>

</body>

</html>
