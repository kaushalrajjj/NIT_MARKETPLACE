<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Panel — NIT KKR Marketplace</title>
    <link  rel="stylesheet" href="../css/base/fonts.css" />
    <!-- Base -->
    <link rel="stylesheet" href="../css/base/variables.css" />
    <link rel="stylesheet" href="../css/base/reset.css" />
    <!-- Components -->
    <link rel="stylesheet" href="../css/components/buttons.css" />
    <link rel="stylesheet" href="../css/components/navbar.css" />
    <link rel="stylesheet" href="../css/components/sidebar.css" />
    <link rel="stylesheet" href="../css/components/modal.css" />
    <!-- Page (admin has its own dark design system on top) -->
    <link rel="stylesheet" href="../css/admin.css" />
    <style>
        .main {
            margin-left: 0 !important;
            padding-top: 20px;
        }

        .navbar {
            position: sticky;
            top: 0;
            z-index: 1000;
        }
    </style>
</head>

<body>
    <!-- Navigation Mount Points -->
    <header>
        <div id="navbar-root"></div>
    </header>
    <aside>
        <div id="sidebar-root"></div>
    </aside>

    <!-- ── MAIN ── -->
    <main class="main">

        <!-- ╔════════ DASHBOARD ════════╗ -->
        <div class="panel active" id="panel-dashboard">
            <div class="stats-row">
                <div class="sc blue">
                    <div class="sc-icon blue">👥</div>
                    <div class="sc-num" id="stat-users">0</div>
                    <div class="sc-label">Total Students</div>
                    <div class="sc-change up">▲ 12%</div>
                </div>
                <div class="sc green">
                    <div class="sc-icon green">📦</div>
                    <div class="sc-num" id="stat-listings">0</div>
                    <div class="sc-label">Live Listings</div>
                    <div class="sc-change up">▲ 5%</div>
                </div>
                <div class="sc orange">
                    <div class="sc-icon orange">₹</div>
                    <div class="sc-num" id="stat-volume">₹0</div>
                    <div class="sc-label">Total Volume</div>
                    <div class="sc-change up">▲ 22%</div>
                </div>
                <div class="sc purple">
                    <div class="sc-icon purple">⏳</div>
                    <div class="sc-num" id="stat-pending">0</div>
                    <div class="sc-label">Pending Approval</div>
                    <div class="sc-change">🕒 Action Needed</div>
                </div>
            </div>

            <div class="chart-grid">
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">New User Registrations (Last 7 Days)</div>
                        <button class="btn btn-ghost btn-xs">View Report</button>
                    </div>
                    <div class="card-body">
                        <div class="mini-chart" id="regChart"></div>
                        <div class="mc-labels" id="regLabels"></div>
                    </div>
                </div>
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">Listing Categories</div>
                    </div>
                    <div class="card-body">
                        <div class="donut-list">
                            <div class="dl-row">
                                <div class="dl-dot" style="background:var(--pri)"></div>
                                <div class="dl-label">Books</div>
                                <div class="dl-bar">
                                    <div class="dl-fill" style="background:var(--pri);width:45%"></div>
                                </div>
                                <div class="dl-val">45%</div>
                            </div>
                            <div class="dl-row">
                                <div class="dl-dot" style="background:var(--acc-green)"></div>
                                <div class="dl-label">Electronics</div>
                                <div class="dl-bar">
                                    <div class="dl-fill" style="background:var(--acc-green);width:25%"></div>
                                </div>
                                <div class="dl-val">25%</div>
                            </div>
                            <div class="dl-row">
                                <div class="dl-dot" style="background:var(--acc)"></div>
                                <div class="dl-label">Cycles</div>
                                <div class="dl-bar">
                                    <div class="dl-fill" style="background:var(--acc);width:20%"></div>
                                </div>
                                <div class="dl-val">20%</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- More panels would go here, omitting for brevity of the refactor -->
        <div class="panel" id="panel-analytics">
            <!-- Analytics Content -->
        </div>

    </main>

    <!-- TOAST -->
    <div id="toast" class="toast">
        <i id="toastIcon">✔</i>
        <span id="toastMsg">Action successful</span>
    </div>

    <script type="module" src="../js/pages/admin.js"></script>

</body>

</html>
