<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Browse Items — NIT KKR Marketplace</title>
    <link <link rel="stylesheet" href="../css/base/fonts.css" />
    <!-- Base -->
    <link rel="stylesheet" href="../css/base/variables.css" />
    <link rel="stylesheet" href="../css/base/reset.css" />
    <!-- Components -->
    <link rel="stylesheet" href="../css/components/buttons.css" />
    <link rel="stylesheet" href="../css/components/navbar.css" />
    <link rel="stylesheet" href="../css/components/sidebar.css" />
    <link rel="stylesheet" href="../css/components/footer.css" />
    <link rel="stylesheet" href="../css/components/product-card.css" />
    <link rel="stylesheet" href="../css/components/modal.css" />
    <!-- Page -->
    <link rel="stylesheet" href="../css/pages/browse.css" />
</head>

<body>

    <!-- NAVBAR & SIDEBAR -->
    <div id="navbar-root"></div>
    <div id="sidebar-root"></div>
    <!-- QUICK VIEW MODAL -->
    <div class="modal-overlay" id="qvModal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title" id="qvTitle">Product Details</div>
                <button class="modal-close" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <div class="modal-img" id="qvEmoji">📚</div>
                <div class="modal-details">
                    <div class="modal-price" id="qvPrice"></div>
                    <div id="qvInfoRows">
                        <!-- Populated dynamically via JS -->
                    </div>
                    <div class="modal-desc" id="qvDesc"></div>
                    <div class="modal-actions" id="modalContactActions">
                        <!-- Contact buttons will be injected here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- FILTER DRAWER (mobile) -->
    <div class="filter-drawer-overlay" id="filterOverlay" onclick="closeFilterDrawer()"></div>
    <div class="filter-drawer" id="filterDrawer">
        <div class="drawer-header">
            <div class="drawer-title" style="font-family:'Syne',sans-serif; font-weight:700">Filters</div>
            <button class="modal-close" onclick="closeFilterDrawer()"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div id="drawerFilters" style="padding:0"></div>
        <div style="padding:20px; border-top:1px solid var(--border); display:flex; gap:12px">
            <button class="btn btn-primary" style="flex:1" onclick="closeFilterDrawer(); applyFilters()">Apply
                Filters</button>
            <button class="btn btn-ghost" onclick="resetFilters(); closeFilterDrawer()">Reset</button>
        </div>
    </div>


    <!-- PAGE HEADER -->
    <header class="page-header">
        <div class="ph-inner">
            <div class="breadcrumb">
                <a href="/">Home</a> <i class="fa-solid fa-chevron-right"></i> <span>Browse Items</span>
            </div>
            <h1 class="ph-title">Browse Marketplace</h1>
            <p class="ph-sub">Explore thousands of verified listings from your campus community.</p>


        </div>
    </header>

    <main class="browse-layout">
        <!-- SIDEBAR -->
        <aside class="filter-sidebar" id="filterSidebar">
            <div class="filter-header">
                <h3>Filters</h3>
                <button class="filter-reset" onclick="resetFilters()">Reset All</button>
            </div>
            <div class="filter-body">
                <!-- Categories -->
                <div class="filter-section">
                    <div class="filter-section-title" onclick="toggleSection(this)">Category <i
                            class="fa-solid fa-chevron-down"></i></div>
                    <div class="cat-filter-list" id="sidebarCatList">
                        <label class="cat-filter-item active" onclick="setCat(this, 'all')">
                            <span class="cat-filter-icon">🏠</span>
                            <span class="cat-filter-name">All Categories</span>
                        </label>
                        <label class="cat-filter-item" onclick="setCat(this, 'Books')">
                            <span class="cat-filter-icon">📚</span>
                            <span class="cat-filter-name">Books & Notes</span>
                        </label>
                        <label class="cat-filter-item" onclick="setCat(this, 'Electronics')">
                            <span class="cat-filter-icon">🔌</span>
                            <span class="cat-filter-name">Electronics</span>
                        </label>
                        <label class="cat-filter-item" onclick="setCat(this, 'Cycles')">
                            <span class="cat-filter-icon">🚲</span>
                            <span class="cat-filter-name">Cycles & Gear</span>
                        </label>
                        <label class="cat-filter-item" onclick="setCat(this, 'Hostel')">
                            <span class="cat-filter-icon">📦</span>
                            <span class="cat-filter-name">Hostel Essentials</span>
                        </label>
                        <label class="cat-filter-item" onclick="setCat(this, 'Tools')">
                            <span class="cat-filter-icon">🛠️</span>
                            <span class="cat-filter-name">Lab & Academic</span>
                        </label>
                        <label class="cat-filter-item" onclick="setCat(this, 'Other')">
                            <span class="cat-filter-icon">✨</span>
                            <span class="cat-filter-name">Other</span>
                        </label>
                    </div>
                </div>

                <!-- Price Range -->
                <div class="filter-section">
                    <div class="filter-section-title" onclick="toggleSection(this)">Price Range <i
                            class="fa-solid fa-chevron-down"></i></div>
                    <div class="price-body">
                        <div class="price-inputs">
                            <div class="price-input-wrap"><span>₹</span><input type="number" id="priceMin"
                                    placeholder="Min" value="">
                            </div>
                            <div class="price-input-wrap"><span>₹</span><input type="number" id="priceMax"
                                    placeholder="Max" value=""></div>
                        </div>
                    </div>
                </div>

                <!-- Condition -->
                <div class="filter-section">
                    <div class="filter-section-title" onclick="toggleSection(this)">Condition <i
                            class="fa-solid fa-chevron-down"></i></div>
                    <div class="check-list">
                        <label class="check-item"><input type="checkbox" name="condition" value="Brand New"
                                checked><span class="check-box"></span><span class="lbl">Brand New</span></label>
                        <label class="check-item"><input type="checkbox" name="condition" value="Like New" checked><span
                                class="check-box"></span><span class="lbl">Like New</span></label>
                        <label class="check-item"><input type="checkbox" name="condition" value="Lightly Used"
                                checked><span class="check-box"></span><span class="lbl">Lightly Used</span></label>
                        <label class="check-item"><input type="checkbox" name="condition" value="Used" checked><span
                                class="check-box"></span><span class="lbl">Used</span></label>
                        <label class="check-item"><input type="checkbox" name="condition"
                                value="Damaged/For Parts"><span class="check-box"></span><span class="lbl">Damaged/For
                                Parts</span></label>
                    </div>
                </div>

                <!-- Location -->
                <div class="filter-section">
                    <div class="filter-section-title" onclick="toggleSection(this)">Hostel/Location <i
                            class="fa-solid fa-chevron-down"></i></div>
                    <select class="hostel-select" id="locationFilter">
                        <option>All Locations</option>
                        <option>BH-1 (Chakravarty)</option>
                        <option>BH-2 (Vishwakarma)</option>
                        <option>BH-3 (Aryabhatta)</option>
                        <option>BH-4 (Bhaskara)</option>
                        <option>BH-5 (Bose)</option>
                        <option>BH-6</option>
                        <option>BH-7</option>
                        <option>BH-8</option>
                        <option>Kalpana Chawla Hall</option>
                        <option>Meera Bhawan</option>
                        <option>Main Gate Area</option>
                    </select>
                </div>

                <!-- Rating -->
                <div class="filter-section">
                    <div class="filter-section-title" onclick="toggleSection(this)">Seller Rating <i
                            class="fa-solid fa-chevron-down"></i></div>
                    <div class="check-list">
                        <label class="check-item"><input type="radio" name="minRating" value="4"><span class="check-box"
                                style="border-radius:50%"></span><span class="lbl">4 stars & up</span></label>
                        <label class="check-item"><input type="radio" name="minRating" value="3"><span class="check-box"
                                style="border-radius:50%"></span><span class="lbl">3 stars & up</span></label>
                        <label class="check-item"><input type="radio" name="minRating" value="0" checked><span
                                class="check-box" style="border-radius:50%"></span><span class="lbl">Any
                                Rating</span></label>
                    </div>
                </div>
                <!-- Apply Button -->
                <div class="filter-section" style="border-bottom:none; padding-top:10px">
                    <button class="btn btn-primary" style="width:100%; justify-content:center; padding:12px"
                        onclick="applyFilters()">
                        <i class="fa-solid fa-filter"></i> Apply Filters
                    </button>
                </div>
            </div>
        </aside>

        <!-- CONTENT -->
        <section class="results-area">
            <!-- Toolbar -->
            <div class="results-toolbar">
                <div class="results-count">Showing <strong id="resultsCount">48</strong> results for "All Items"</div>
                <div class="toolbar-right">
                    <div style="font-size:.85rem; color:var(--text-3)">Sort:</div>
                    <select class="sort-select" onchange="applySort(this.value)">
                        <option value="newest">Newest First</option>
                        <option value="price_low">Price: Low to High</option>
                        <option value="price_high">Price: High to Low</option>
                        <option value="popular">Most Popular</option>
                    </select>
                    <div class="view-toggle">
                        <button class="view-btn active" id="gridViewBtn" onclick="setView('grid')"><i
                                class="fa-solid fa-grid-2"></i></button>
                        <button class="view-btn" id="listViewBtn" onclick="setView('list')"><i
                                class="fa-solid fa-list"></i></button>
                    </div>
                </div>
            </div>

            <!-- Active Filter Chips -->
            <div class="active-filters" id="activeFilters">
                <!-- Filters will be injected here -->
            </div>

            <!-- Grid -->
            <div class="products-grid" id="productsGrid">
                <!-- Products will be loaded dynamically -->
            </div>
        </section>
    </main>

    <!-- Mobile Filter Btn -->
    <button class="btn btn-primary btn-lg filter-mobile-btn" onclick="openFilterDrawer()">
        <i class="fa-solid fa-filter"></i> Filters
    </button>

    <!-- FOOTER -->
    <div id="footer-root"></div>

    <script type="module" src="../js/pages/browse.js"></script>

</body>

</html>
